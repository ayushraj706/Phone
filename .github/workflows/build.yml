name: Build My Secure Phone App

on:
  workflow_dispatch: # Isse aap button daba kar build kar payenge

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleFossifyDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MySafePhoneApp
          path: app/build/outputs/apk/fossify/debug/*.apk
          
