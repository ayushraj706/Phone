name: Build My Secure Phone App

on:
  workflow_dispatch: # Isse aap manually build start kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        # Yahan 'Fossify' ki jagah 'Foss' flavor use ho raha hai
        run: ./gradlew assembleFossDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MySafePhoneApp
          # Path ko bhi flavor ke hisaab se update kiya gaya hai
          path: app/build/outputs/apk/foss/debug/*.apk
          
